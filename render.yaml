services:
  - type: web
    name: ttr-api
    env: node
    plan: free
    rootDir: .
    buildCommand: npm ci --include=dev --production=false && npm run build -w packages/shared && npm run build -w apps/server
    startCommand: npm run start -w apps/server
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: CORS_ORIGIN
        value: https://ttr-client.onrender.com

  - type: web
    name: ttr-client
    env: static
    rootDir: .
    buildCommand: npm ci --include=dev --production=false && npm run build -w packages/shared && npm run build -w apps/client
    staticPublishPath: apps/client/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_SERVER_URL
        value: https://ttr-api.onrender.com

