services:
  - type: web
    name: ttr-server
    env: node
    region: ohio
    plan: free
    rootDir: .
    buildCommand: npm ci --include=dev --production=false && npm run build -w packages/shared && npm run build -w apps/server
    startCommand: npm run start -w apps/server
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production

  - type: static_site
    name: ttr-client
    staticPublishPath: apps/client/dist
    buildCommand: npm ci --include=dev --production=false && npm run build -w packages/shared && npm run build -w apps/client
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_SERVER_URL
        fromService:
          type: web
          name: ttr-server
          property: url

