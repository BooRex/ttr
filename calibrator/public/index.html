<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Europe Cities Calibrator</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <div id="sidebar">
    <h2>🗺 Europe Cities Calibrator</h2>
    <div class="subtitle">Drag города и label offsets для `europeCities`</div>

    <div id="city-list"></div>

    <div id="controls">
      <div class="control-row">
        <label>
          Zoom
          <input id="zoom-input" type="range" min="30" max="180" value="100">
        </label>
        <label>
          Mode
          <select id="mode-select">
            <option value="both" selected>both</option>
            <option value="city">city</option>
            <option value="label">label</option>
          </select>
        </label>
      </div>

      <div class="control-row">
        <button id="copy-output-btn" class="primary">📋 Copy europeCities</button>
        <button id="undo-btn" class="warn">↩ Restore defaults</button>
      </div>

      <div class="control-row">
        <button id="reset-city-btn">Reset city</button>
        <button id="reset-label-btn">Reset label</button>
      </div>

      <div style="font-size:0.7rem;color:#94a3b8;">Current zoom: <span id="zoom-value">100%</span></div>
    </div>

    <div id="output-area">Нажми "Copy europeCities" чтобы получить объект для `europeLayout.ts`.</div>
  </div>

  <div id="map-area">
    <div id="canvas-wrap">
      <img id="map-img" src="/assets/maps/europe.svg" alt="Europe map" draggable="false">
      <div id="overlay" class="mode-both"></div>
    </div>
    <div id="cursor-info">svg: 0, 0 | board: 0, 0</div>
  </div>

  <div id="hint">Загружено</div>

  <script type="module" src="/calibrator.js"></script>
</body>
</html>
