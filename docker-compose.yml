services:
  server:
    image: node:20
    working_dir: /app
    volumes:
      - ./:/app
    command: sh -c "npm install && npm run dev -w apps/server"
    ports:
      - "3000:3000"
  client:
    image: node:20
    working_dir: /app
    volumes:
      - ./:/app
    command: sh -c "npm install && npm run dev -w apps/client -- --host 0.0.0.0"
    environment:
      - VITE_SERVER_URL=http://localhost:3000
    ports:
      - "5173:5173"

